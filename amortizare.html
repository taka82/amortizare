<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Amortizare">
<meta name="theme-color" content="#0d1117">
<title>Amortizare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #151c2b; --surface2: #1a2233;
    --border: #1e2d3d; --text: #f1f5f9; --muted: #64748b; --dim: #475569;
    --solar: #f59e0b; --fidelis: #3b82f6; --green: #10b981;
    --purple: #8b5cf6; --pink: #ec4899; --red: #ef4444;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overflow-x: hidden; }
  body { padding-bottom: var(--safe-bottom); }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; }

  .header {
    padding: calc(var(--safe-top) + 16px) 20px 16px;
    background: linear-gradient(180deg, #111827 0%, #0d1117 100%);
    position: sticky; top: 0; z-index: 10;
  }
  .header-inner { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    background: var(--surface); border: none; color: var(--muted);
    width: 36px; height: 36px; border-radius: 10px; font-size: 17px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .header-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .header-title { font-size: 22px; font-weight: 700; }
  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .sync-status { font-size: 11px; font-family: 'DM Mono', monospace; }
  .sync-status.ok { color: var(--green); }
  .sync-status.err { color: var(--red); }
  .sync-status.loading { color: var(--solar); }

  .content { padding: 0 16px 40px; }
  .ring-wrap { margin: 8px 0 20px; display: flex; justify-content: center; }
  .ring-dash { transition: stroke-dasharray 1s cubic-bezier(.4,0,.2,1); }

  .cards-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .card { background: var(--surface); border-radius: 16px; padding: 14px 16px; flex: 1; border-top: 3px solid transparent; transition: transform .15s; }
  .card:active { transform: scale(.97); }
  .card-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .card-value { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1.2; }
  .card-sub { font-size: 11px; color: var(--dim); margin-top: 3px; }

  .add-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--solar), var(--fidelis));
    border: none; border-radius: 16px; color: #0f172a;
    font-weight: 700; font-size: 16px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; margin-top: 8px; transition: opacity .15s, transform .15s;
  }
  .add-btn:active { opacity: .85; transform: scale(.98); }

  .section-label { font-size: 11px; color: var(--dim); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: .8px; }
  .history-item { background: var(--surface); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background .15s; }
  .history-item:active { background: var(--surface2); }
  .history-month { font-weight: 600; font-size: 14px; }
  .history-detail { font-size: 12px; color: var(--dim); margin-top: 2px; }
  .history-total { color: var(--green); font-weight: 700; font-family: 'DM Mono', monospace; font-size: 15px; }

  .form-group { margin-bottom: 22px; }
  .form-label { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px; color: var(--text);
    font-size: 20px; font-family: 'DM Mono', monospace; outline: none;
    transition: border-color .2s; -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--solar); }
  .form-input.blue:focus { border-color: var(--fidelis); }
  .form-input[type="month"] { font-size: 16px; font-family: 'DM Sans', sans-serif; }
  .form-input.small { font-size: 14px; font-family: 'DM Sans', sans-serif; }
  .form-hint { font-size: 11px; color: var(--dim); margin-top: 5px; }

  .preview-box { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.3); border-radius: 12px; padding: 12px 16px; text-align: center; margin-bottom: 20px; }
  .preview-label { color: var(--dim); font-size: 12px; }
  .preview-value { color: var(--green); font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; }

  .btn-row { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; padding: 14px; background: var(--surface); border: none; border-radius: 14px; color: var(--muted); font-weight: 600; font-size: 15px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-save { flex: 2; padding: 14px; background: linear-gradient(135deg, var(--solar), var(--fidelis)); border: none; border-radius: 14px; color: #0f172a; font-weight: 700; font-size: 15px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-save:disabled { opacity: .5; }
  .btn-save:active:not(:disabled), .btn-cancel:active { opacity: .8; }
  .del-btn { background: rgba(239,68,68,.15); border: none; color: var(--red); font-size: 12px; font-family: 'DM Sans',sans-serif; padding: 6px 12px; border-radius: 8px; cursor: pointer; display: block; margin: 10px auto 0; }

  .progress-bar-bg { background: var(--surface); border-radius: 8px; height: 8px; margin: 16px 0 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--solar), var(--fidelis)); transition: width 1s cubic-bezier(.4,0,.2,1); }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* Setup */
  .setup-card { background: var(--surface); border-radius: 20px; padding: 24px; margin: 20px 0; }
  .setup-icon { font-size: 40px; text-align: center; margin-bottom: 16px; }
  .setup-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .setup-desc { font-size: 13px; color: var(--dim); line-height: 1.6; margin-bottom: 20px; }
  .setup-step { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; font-size: 13px; color: var(--muted); line-height: 1.5; }
  .step-num { background: var(--surface2); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--solar); flex-shrink: 0; }
  .setup-link { color: var(--fidelis); }
  .full-btn { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: 700; font-size: 15px; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px; }
  .full-btn.primary { background: linear-gradient(135deg, var(--solar), var(--fidelis)); color: #0f172a; }
  .full-btn.secondary { background: var(--surface2); color: var(--muted); }

  .toast { position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const TARGET = 70229;
const MONTHS_RO = ['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];
const GH_TOKEN_KEY = 'gh_token';
const GH_REPO = 'taka82/amortizare';
const DATA_FILE = 'data.json';

const fmt = n => n.toLocaleString('ro-RO', {minimumFractionDigits:2,maximumFractionDigits:2});
const monthLabel = key => { const [y,m]=key.split('-'); return `${MONTHS_RO[parseInt(m)-1]} ${y}`; };
const currentKey = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };

let toastTimer;
function toast(msg, dur=2500) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'), dur);
}

let screen='loading';
let data={};
let editKey=null;
let ghToken=localStorage.getItem(GH_TOKEN_KEY)||'';
let fileSha=null;
let syncState='idle';

async function ghFetch(path, method='GET', body=null) {
  const opts={method,headers:{'Authorization':`Bearer ${ghToken}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  return fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`,opts);
}

async function loadFromGitHub() {
  syncState='loading'; render();
  try {
    const r=await ghFetch(DATA_FILE);
    if(r.status===404){
      data={'2026-04':{solar:230.42,fidelis:0}};
      fileSha=null; syncState='ok'; screen='dashboard'; render();
      return;
    }
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const json=await r.json();
    fileSha=json.sha;
    data=JSON.parse(atob(json.content.replace(/\n/g,'')));
    syncState='ok'; screen='dashboard'; render();
  } catch(e) {
    syncState='error'; screen='dashboard'; render();
    toast('⚠️ Nu s-au putut încărca datele din GitHub');
  }
}

async function saveToGitHub() {
  if(!ghToken) return;
  syncState='loading'; updateSyncStatus();
  try {
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const body={message:`Update ${currentKey()}`,content,...(fileSha?{sha:fileSha}:{})};
    const r=await ghFetch(DATA_FILE,'PUT',body);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const json=await r.json();
    fileSha=json.content.sha;
    syncState='ok'; updateSyncStatus();
    toast('✅ Salvat în GitHub');
  } catch(e) {
    syncState='error'; updateSyncStatus();
    toast('❌ Eroare la salvare în GitHub');
  }
}

function updateSyncStatus() {
  const el=document.getElementById('syncStatus');
  if(!el) return;
  const map={loading:['loading','⟳ sync...'],ok:['ok','✓ sync'],error:['err','✗ sync'],idle:['','']};
  const [cls,txt]=map[syncState]||['',''];
  el.className=`sync-status ${cls}`; el.textContent=txt;
}

function render() {
  const app=document.getElementById('app');
  if(screen==='loading'){app.innerHTML=renderLoading();return;}
  if(screen==='setup'){app.innerHTML=renderSetup();bindEvents();return;}
  if(screen==='dashboard'){app.innerHTML=renderDashboard();bindEvents();return;}
  app.innerHTML=renderForm();bindEvents();
}

function renderLoading() {
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px">
    <div style="font-size:48px">☀️</div>
    <div style="color:var(--muted);font-size:14px">Se încarcă datele...</div>
  </div>`;
}

function renderSetup() {
  return `
  <div class="header"><div class="header-inner">
    <div><div class="header-label">Configurare inițială</div><div class="header-title">GitHub Sync</div></div>
  </div></div>
  <div class="content">
    <div class="setup-card">
      <div class="setup-icon">🔑</div>
      <div class="setup-title">Conectează-te la GitHub</div>
      <div class="setup-desc">Datele se salvează automat în repository-ul tău și sunt sincronizate pe orice dispozitiv unde deschizi aplicația.</div>
      <div class="setup-step"><div class="step-num">1</div><div>Mergi la <strong>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</strong></div></div>
      <div class="setup-step"><div class="step-num">2</div><div>Apasă <strong>Generate new token (classic)</strong>, bifează <strong>repo</strong>, apasă <strong>Generate token</strong></div></div>
      <div class="setup-step"><div class="step-num">3</div><div>Copiază tokenul (începe cu <code style="color:var(--solar);font-family:'DM Mono',monospace">ghp_</code>) și lipește-l mai jos</div></div>
      <div class="form-group" style="margin-top:20px;margin-bottom:12px">
        <label class="form-label" style="color:var(--muted)">Personal Access Token</label>
        <input class="form-input small" type="password" id="tokenInput" placeholder="ghp_..." autocomplete="off" spellcheck="false">
      </div>
      <button class="full-btn primary" id="connectBtn">Conectează și încarcă datele</button>
    </div>
  </div>`;
}

function renderRing(pct) {
  const r=72,circ=2*Math.PI*r,dash=circ*Math.min(pct/100,1);
  return `<svg width="170" height="170" viewBox="0 0 170 170">
    <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
    <circle cx="85" cy="85" r="${r}" fill="none" stroke="#1e2533" stroke-width="14"/>
    <circle cx="85" cy="85" r="${r}" fill="none" stroke="url(#g)" stroke-width="14" stroke-linecap="round" stroke-dasharray="${dash} ${circ}" transform="rotate(-90 85 85)" class="ring-dash"/>
    <text x="85" y="80" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" font-family="DM Mono,monospace">${pct.toFixed(1)}%</text>
    <text x="85" y="102" text-anchor="middle" fill="#64748b" font-size="11" font-family="DM Sans,sans-serif">amortizat</text>
  </svg>`;
}

function renderDashboard() {
  const keys=Object.keys(data).sort();
  const totalSolar=keys.reduce((s,k)=>s+(data[k].solar||0),0);
  const totalFidelis=keys.reduce((s,k)=>s+(data[k].fidelis||0),0);
  const total=totalSolar+totalFidelis;
  const pct=(total/TARGET)*100;
  const remaining=Math.max(0,TARGET-total);
  const avgPerMonth=keys.length>0?total/keys.length:0;
  let estLabel='—';
  if(avgPerMonth>0){const d=new Date();d.setMonth(d.getMonth()+Math.ceil(remaining/avgPerMonth));estLabel=d.toLocaleDateString('ro-RO',{month:'long',year:'numeric'});}
  const start=new Date(2026,3,1),now=new Date();
  const elapsed=Math.max(0,(now.getFullYear()-start.getFullYear())*12+(now.getMonth()-start.getMonth()));
  const loanPaid=Math.min(elapsed*(TARGET/24),TARGET);
  const syncCls=syncState==='ok'?'ok':syncState==='error'?'err':syncState==='loading'?'loading':'';
  const syncTxt=syncState==='ok'?'✓ sync':syncState==='error'?'✗ sync':syncState==='loading'?'⟳ sync...':'';
  const histHTML=keys.length===0
    ?`<div class="empty"><div class="empty-icon">☀️</div>Nicio lună înregistrată.<br>Apasă butonul de mai jos!</div>`
    :[...keys].reverse().map(k=>{const e=data[k],t=(e.solar||0)+(e.fidelis||0);return`<div class="history-item" data-edit="${k}"><div><div class="history-month">${monthLabel(k)}</div><div class="history-detail">☀️ ${fmt(e.solar||0)} &nbsp;|&nbsp; 📄 ${fmt(e.fidelis||0)}</div></div><div class="history-total">+${fmt(t)} RON</div></div>`;}).join('');

  return `
  <div class="header"><div class="header-inner">
    <div><div class="header-label">Tracker investiție</div><div class="header-title">Amortizare</div></div>
    <div class="header-right">
      <span class="sync-status ${syncCls}" id="syncStatus">${syncTxt}</span>
      <button class="icon-btn" id="settingsBtn">⚙️</button>
    </div>
  </div></div>
  <div class="content">
    <div class="ring-wrap">${renderRing(pct)}</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.min(pct,100)}%"></div></div>
    <div class="progress-labels"><span>${fmt(total)} RON recuperat</span><span>${fmt(TARGET)} RON total</span></div>
    <div style="margin-top:16px">
      <div class="cards-row">
        <div class="card" style="border-top-color:#f59e0b"><div class="card-label">☀️ Solar total</div><div class="card-value">${fmt(totalSolar)}</div><div class="card-sub">RON</div></div>
        <div class="card" style="border-top-color:#3b82f6"><div class="card-label">📄 Fidelis total</div><div class="card-value">${fmt(totalFidelis)}</div><div class="card-sub">RON</div></div>
      </div>
      <div class="cards-row">
        <div class="card" style="border-top-color:#10b981"><div class="card-label">💰 Recuperat</div><div class="card-value">${fmt(total)}</div><div class="card-sub">din ${fmt(TARGET)} RON</div></div>
        <div class="card" style="border-top-color:#8b5cf6"><div class="card-label">🎯 Est. amortizare</div><div class="card-value" style="font-size:13px;font-family:'DM Sans',sans-serif">${estLabel}</div><div class="card-sub">${avgPerMonth>0?fmt(avgPerMonth)+' RON/lună':''}</div></div>
      </div>
      <div class="cards-row">
        <div class="card" style="border-top-color:#ec4899"><div class="card-label">🏦 Credit CEC</div><div class="card-value">${fmt(loanPaid)}</div><div class="card-sub">${elapsed} rate din 24</div></div>
        <div class="card" style="border-top-color:#475569"><div class="card-label">📉 Rămas</div><div class="card-value">${fmt(remaining)}</div><div class="card-sub">RON</div></div>
      </div>
    </div>
    <button class="add-btn" id="addBtn">+ Adaugă lună</button>
    ${keys.length>0?`<div class="section-label">Istoric luni</div>`:''}
    <div id="history">${histHTML}</div>
  </div>`;
}

function renderForm() {
  const isEdit=screen==='edit'&&editKey;
  const existing=isEdit?data[editKey]:{};
  const defSolar=isEdit?(existing.solar||0):'';
  const defFidelis=isEdit?(existing.fidelis||0):'';
  return `
  <div class="header"><div class="header-inner">
    <button class="icon-btn" id="backBtn">←</button>
    <div><div class="header-label">${isEdit?'Editează':'Introdu date'}</div><div class="header-title">${isEdit?monthLabel(editKey):'Lună nouă'}</div></div>
  </div></div>
  <div class="content">
    <div class="form-group">
      <label class="form-label" style="color:var(--muted)">Luna</label>
      <input class="form-input" type="month" id="monthInput" value="${isEdit?editKey:currentKey()}" min="2026-04" ${isEdit?'disabled':''}>
    </div>
    <div class="form-group">
      <label class="form-label" style="color:var(--solar)">☀️ Solar.web — Earnings luna (RON)</label>
      <input class="form-input" type="text" inputmode="decimal" id="solarInput" placeholder="ex: 230,42" value="${defSolar?String(defSolar).replace('.',','):''}">
      <div class="form-hint">Solar.web → Earnings → valoarea „Month"</div>
    </div>
    <div class="form-group">
      <label class="form-label" style="color:var(--fidelis)">📄 Dobândă Fidelis (RON)</label>
      <input class="form-input blue" type="text" inputmode="decimal" id="fidelisInput" placeholder="ex: 1100,00" value="${defFidelis?String(defFidelis).replace('.',','):''}">
      <div class="form-hint">Suma cupon primită în această lună</div>
    </div>
    <div class="preview-box" id="preview" style="display:none">
      <div class="preview-label">Total luna aceasta</div>
      <div class="preview-value" id="previewVal">0,00 RON</div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" id="cancelBtn">Anulează</button>
      <button class="btn-save" id="saveBtn">Salvează</button>
    </div>
    ${isEdit?`<button class="del-btn" id="delBtn">🗑 Șterge luna ${monthLabel(editKey)}</button>`:''}
  </div>`;
}

function bindEvents() {
  if(screen==='setup') {
    document.getElementById('connectBtn').onclick=async()=>{
      const tok=document.getElementById('tokenInput').value.trim();
      if(!tok){toast('Introdu tokenul mai întâi');return;}
      ghToken=tok; localStorage.setItem(GH_TOKEN_KEY,tok);
      screen='loading'; render(); await loadFromGitHub();
    };
    return;
  }
  if(screen==='dashboard') {
    document.getElementById('addBtn').onclick=()=>{screen='add';editKey=null;render();};
    document.getElementById('settingsBtn').onclick=()=>{
      if(confirm('Deconectează tokenul GitHub de pe acest dispozitiv?')){
        localStorage.removeItem(GH_TOKEN_KEY);
        ghToken='';fileSha=null;data={};screen='setup';render();
      }
    };
    document.querySelectorAll('.history-item').forEach(el=>{
      el.onclick=()=>{editKey=el.dataset.edit;screen='edit';render();};
    });
    return;
  }
  document.getElementById('backBtn').onclick=()=>{screen='dashboard';render();};
  document.getElementById('cancelBtn').onclick=()=>{screen='dashboard';render();};
  const solarIn=document.getElementById('solarInput');
  const fidelisIn=document.getElementById('fidelisInput');
  const preview=document.getElementById('preview');
  const previewVal=document.getElementById('previewVal');
  function updatePreview(){
    const s=parseFloat(solarIn.value.replace(',','.'))||0;
    const f=parseFloat(fidelisIn.value.replace(',','.'))||0;
    preview.style.display=(s>0||f>0)?'block':'none';
    if(previewVal) previewVal.textContent=fmt(s+f)+' RON';
  }
  solarIn.addEventListener('input',updatePreview);
  fidelisIn.addEventListener('input',updatePreview);
  if(screen==='edit') updatePreview();
  document.getElementById('saveBtn').onclick=async()=>{
    const btn=document.getElementById('saveBtn');
    btn.disabled=true; btn.textContent='Se salvează...';
    const month=document.getElementById('monthInput').value||currentKey();
    const s=parseFloat(solarIn.value.replace(',','.'))||0;
    const f=parseFloat(fidelisIn.value.replace(',','.'))||0;
    data[month]={solar:s,fidelis:f};
    screen='dashboard'; render();
    await saveToGitHub();
  };
  const delBtn=document.getElementById('delBtn');
  if(delBtn){
    delBtn.onclick=async()=>{
      if(confirm(`Ștergi ${monthLabel(editKey)}?`)){
        delete data[editKey];
        screen='dashboard'; render();
        await saveToGitHub();
      }
    };
  }
}

(async()=>{
  if(!ghToken){screen='setup';render();return;}
  screen='loading';render();
  await loadFromGitHub();
})();
</script>
</body>
